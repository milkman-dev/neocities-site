    // ─── FIXED CANVAS SCALING ────────────────────────────────────────────────────
    const CANVAS_W = 1280, CANVAS_H = 720;
    const scene = document.getElementById('scene');

    function scaleScene() {
      const scale = Math.min(window.innerWidth / CANVAS_W, window.innerHeight / CANVAS_H);
      scene.style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', scaleScene);
    scaleScene();
    // ────────────────────────────────────────────────────────────────────────────

    let current = 0;
    let isTyping = false;
    let twTimer = null;
    let musicStarted = false;

    const textEl = document.getElementById('dialogue-text');
    const nameEl = document.getElementById('nameplate');
    const optionsEl = document.getElementById('options');
    const bgm = document.getElementById('bgm');

    function startMusic() {
      if (!musicStarted) {
        bgm.play().catch(() => { });
        musicStarted = true;
      }
    }

    // Try autoplay immediately; fall back to first interaction if blocked
    bgm.play().then(() => { musicStarted = true; }).catch(() => {
      const unlock = () => { startMusic(); document.removeEventListener('click', unlock); };
      document.addEventListener('click', unlock);
    });

    function showScene(index) {
      current = index;
      const s = scenes[index];
      const narrator = s.speaker === '...';

      nameEl.textContent = narrator ? 'Narrator' : s.speaker;
      nameEl.dataset.speaker = narrator ? 'narrator' : s.speaker.toLowerCase();
      textEl.className = narrator ? 'typing italic' : 'typing';
      textEl.textContent = '';
      optionsEl.innerHTML = '';
      optionsEl.classList.add('hidden');

      typewrite(s.text, () => {
        textEl.className = narrator ? 'italic' : '';
        const hasOptions = s.options && s.options.length;
        if (!hasOptions && s.next !== null) textEl.classList.add('advance');
        if (hasOptions) showOptions(s.options);
      });
    }

    function typewrite(text, onDone) {
      if (!text) { isTyping = false; onDone(); return; }
      isTyping = true;
      let i = 0;
      twTimer = setInterval(() => {
        textEl.textContent += text[i];
        i++;
        if (i >= text.length) {
          clearInterval(twTimer);
          twTimer = null;
          isTyping = false;
          onDone();
        }
      }, 28);
    }

    function skipTypewriter() {
      if (twTimer) { clearInterval(twTimer); twTimer = null; }
      isTyping = false;
      const s = scenes[current];
      const narrator = s.speaker === '...';
      textEl.textContent = s.text;
      textEl.className = narrator ? 'italic' : '';
      const hasOptions = s.options && s.options.length;
      if (!hasOptions && s.next !== null) textEl.classList.add('advance');
      if (hasOptions) showOptions(s.options);
    }

    function showOptions(options) {
      optionsEl.classList.remove('hidden');
      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt.text;
        btn.addEventListener('click', e => {
          e.stopPropagation();
          showScene(opt.next);
        });
        optionsEl.appendChild(btn);
      });
    }

    function advance() {
      if (isTyping) { skipTypewriter(); return; }
      const cur = scenes[current];
      if (cur.options && cur.options.length) return;
      if (cur.next === null) return;
      const nextIndex = (cur.next !== undefined) ? cur.next : current + 1;
      if (nextIndex < scenes.length) showScene(nextIndex);
    }

    scene.addEventListener('click', advance);

    document.getElementById('close-btn').addEventListener('click', e => {
      e.stopPropagation();
      bgm.pause();
      bgm.currentTime = 0;
    });

    showScene(0);
  </script>
