
<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; image-rendering: pixelated; }

  body {
    background: #2a0a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
  }

  .screen {
    width: 510px;
    background: #1a0a2e;
    border: 3px solid #ff2d78;
    position: relative;
    overflow: hidden;
  }

  /* White inner border overlay */
  .inner-border {
    position: absolute;
    inset: 3px;
    border: 2px solid #ffffff;
    z-index: 50;
    pointer-events: none;
  }

  /* Scanline overlay */
  .scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.06) 3px,
      rgba(0,0,0,0.06) 4px
    );
    pointer-events: none;
    z-index: 51;
  }

  /* Top title bar */
  .title-bar {
    background: #2a0a3a;
    border-bottom: 2px solid #ff2d78;
    padding: 3px 10px;
    font-size: 6.5px;
    color: #d080a8;
    letter-spacing: 1px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 18px;
  }

  /* Main area */
  .main-area {
    display: flex;
    height: 310px;
  }

  /* Left portrait area */
  .portrait-area {
    width: 57%;
    background: linear-gradient(180deg, #1c0838 0%, #100a2a 50%, #180530 100%);
    border-right: 2px solid #ff2d78;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* City/background glow effect */
  .portrait-area::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 70% 30%, rgba(255, 80, 180, 0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 30% 70%, rgba(80, 40, 200, 0.2) 0%, transparent 50%);
  }

  /* Neon grid floor */
  .portrait-area::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 50%;
    background:
      linear-gradient(rgba(255,45,120,0.1) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,45,120,0.1) 1px, transparent 1px);
    background-size: 18px 18px;
    transform: perspective(80px) rotateX(35deg);
    transform-origin: bottom;
  }

  .portrait-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    opacity: 0.3;
    z-index: 1;
  }

  .portrait-placeholder .figure {
    width: 90px;
    height: 130px;
    border: 2px dashed #ff85b8;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    color: #ff85b8;
  }

  .portrait-placeholder p {
    font-size: 5.5px;
    color: #ff85b8;
    letter-spacing: 1px;
    text-align: center;
    line-height: 1.8;
  }

  /* Right column */
  .right-col {
    width: 43%;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* Stats panel */
  .stats-panel {
    border-bottom: 2px solid #ff2d78;
  }

  .stats-header {
    background: #d94f72;
    padding: 5px 8px;
    font-size: 8px;
    color: #fff;
    letter-spacing: 4px;
    text-align: center;
    border-bottom: 2px solid #ff2d78;
    text-shadow: 1px 1px 0 #7a0020;
  }

  .stats-list {
    background: #220840;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .stat-row {
    display: flex;
    align-items: center;
    font-size: 6.5px;
    color: #f0c0d8;
    gap: 4px;
  }

  .stat-label { color: #fff; min-width: 12px; }
  .stat-val   { color: #ffddee; }
  .stat-note  { color: #a06888; font-size: 5.5px; flex: 1; }

  .hearts { display: flex; gap: 2px; margin-left: auto; }
  .heart  { color: #cc1a4a; font-size: 8px; opacity: 0.3; }
  .heart.on { opacity: 1; }

  /* Video panel */
  .video-panel {
    background: #08000f;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 2px solid #ff2d78;
  }

  .no-video {
    font-size: 7px;
    color: #3a1a50;
    letter-spacing: 1px;
  }

  /* Badge — sits at bottom-right, overlapping the border */
  .badge-wrap {
    display: flex;
    justify-content: flex-end;
    background: #08000f;
  }

  .badge {
    background: #e0304e;
    border: 2px solid #ff2d78;
    border-top: none;
    padding: 3px 8px;
    font-size: 5.5px;
    color: #fff;
    letter-spacing: 1px;
  }

  /* Dialogue box — pink/coral like the original */
  .dialogue-box {
    background: #e0507a;
    border-top: 3px solid #ff2d78;
    padding: 10px 14px 12px;
    position: relative;
  }

  /* Lighter top highlight */
  .dialogue-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: rgba(255,255,255,0.3);
  }

  .dialogue-text {
    font-size: 7px;
    color: #fff;
    line-height: 2;
    letter-spacing: 0.5px;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .cursor {
    display: inline-block;
    width: 7px;
    height: 9px;
    background: #fff;
    animation: blink 1s step-end infinite;
    vertical-align: middle;
    margin-left: 2px;
  }
</style>
</head>
<body>
<div class="screen">
  <div class="inner-border"></div>
  <div class="scanlines"></div>

  <!-- Title bar -->
  <div class="title-bar">
    <span>Paradise 目◇</span>
    <span style="color:#553366; font-size:5px">◆◆</span>
  </div>

  <!-- Main area -->
  <div class="main-area">

    <!-- Portrait -->
    <div class="portrait-area">
      <div class="portrait-placeholder">
        <div class="figure">◉</div>
        <p>CHARACTER<br>SPRITE</p>
      </div>
    </div>

    <!-- Right column -->
    <div class="right-col">

      <!-- Stats -->
      <div class="stats-panel">
        <div class="stats-header">経 験 値</div>
        <div class="stats-list">
          <div class="stat-row">
            <span class="stat-label">口</span>
            <span class="stat-val">0</span>
            <span class="stat-note">(未開発)</span>
            <div class="hearts"><span class="heart on">♥</span><span class="heart">♥</span><span class="heart">♥</span></div>
          </div>
          <div class="stat-row">
            <span class="stat-label">手</span>
            <span class="stat-val">0</span>
            <span class="stat-note">(未開発)</span>
            <div class="hearts"><span class="heart on">♥</span><span class="heart">♥</span><span class="heart">♥</span></div>
          </div>
          <div class="stat-row">
            <span class="stat-label">胸</span>
            <span class="stat-val">0</span>
            <span class="stat-note">(未開発)</span>
            <div class="hearts"><span class="heart on">♥</span><span class="heart">♥</span><span class="heart">♥</span></div>
          </div>
          <div class="stat-row">
            <span class="stat-label">穴</span>
            <span class="stat-val">0</span>
            <span class="stat-note">(未開発)</span>
            <div class="hearts"><span class="heart on">♥</span><span class="heart">♥</span><span class="heart">♥</span></div>
          </div>
        </div>
      </div>

      <!-- Video -->
      <div class="video-panel">
        <span class="no-video">No video...</span>
      </div>

      <!-- Badge -->
      <div class="badge-wrap">
        <div class="badge">待開発の奴隷少女</div>
      </div>

    </div>
  </div>

  <!-- Dialogue -->
  <div class="dialogue-box">
    <div class="dialogue-text">
      那个谢谢您，救了昔角。请问这里是什么地方？<br>
      还有"手术费要用身体来还"是什么意思<span class="cursor"></span>
    </div>
  </div>

</div>
</body>
</html>
