<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Game</title>
  <link rel="icon" href="./res/img/milkmandev-avatar.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/word-game.css">
</head>

<body>

  <div id="scene">
    <div class="inner-border"></div>
    <div class="scanlines"></div>

    <!-- Main row: char panel + right column -->
    <div id="main-row">

      <div id="char-panel">
        <a id="close-btn" href="./home.html">EXIT ×</a>
        <div id="neon-sign">記憶の楽園</div>
        <img src="./res/img/succubus-oc.png" alt="character sprite" id="char-sprite" />
      </div>

      <div id="game-panel">
        <div id="title-bar">
          <span id="game-title">ワード記憶ゲーム</span>
          <div id="title-stats">
            <span>RND&nbsp;<span id="round-display">01</span></span>
            <span>SCR&nbsp;<span id="score-display">00</span></span>
          </div>
        </div>

        <div id="top-area">
          <div id="correct-words-panel">
            <div class="panel-header">
              <div class="marquee-inner">
                <span>記憶した言葉</span>
              </div>
            </div>
            <div id="correct-words-list"></div>
          </div>
          <div id="lives-panel">
            <div id="hearts"></div>
          </div>
        </div>

        <div class="video-panel">
          <div id="submitted-words"></div>
          <div id="typing-area" class="hidden">
            <span class="terminal-prompt">›</span>
            <input id="word-input" type="text" autocomplete="off" spellcheck="false" />
          </div>
        </div>

        <div id="timer-bar-wrap">
          <div id="timer-bar"></div>
        </div>
      </div>

    </div><!-- /#main-row -->

    <div id="boi-area">
      <div id="boi-text-area">
        <span id="boi-arrow">▶</span>
        <div id="boi-bubble"></div><span class="cursor"></span>
      </div>
    </div>

    <!-- Overlays — absolute, cover whole scene -->
    <div id="ready-screen" class="hidden">
      <div id="ready-eyebrow">get ready</div>
      <span id="ready-text">ROUND 01</span>
    </div>

    <div id="gameover-screen" class="hidden">
      <div id="gameover-title">GAME OVER</div>
      <div id="final-score"></div>
      <button id="restart-btn">► RESTART</button>
    </div>

    <div id="start-overlay">
      <div id="start-box">
        <div id="start-title">ワード記憶ゲーム</div>
        <button id="start-btn">► START</button>
        <div id="start-hint">step up to the table</div>
      </div>
    </div>

  </div><!-- /#scene -->

  <audio id="bgm" src="https://raw.githubusercontent.com/milkman-dev/neocities-site/main/res/ogg/minimal-casino.mp3" loop></audio>

  <script>
    // ── Scene scaling ────────────────────────────────────────────
    const CANVAS_W = 1280, CANVAS_H = 720;
    const scene = document.getElementById('scene');
    function scaleScene() {
      const scale = Math.min(window.innerWidth / CANVAS_W, window.innerHeight / CANVAS_H);
      scene.style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', scaleScene);
    scaleScene();

    // ── Word bank ────────────────────────────────────────────────
    const WORDS = {

        'bay', 'bid', 'bun', 'cob', 'cod', 'cog', 'dam', 'din', 'dip', 'dot', 'dub', 'dug', 'elm', 'emu', 'eon', 'era', 'eve', 'ewe', 'fan', 'fat',
        'fib', 'fin', 'fit', 'fix', 'foe', 'fun', 'gap', 'gas', 'gel', 'gin', 'gnu', 'gum', 'gut', 'hay', 'hem', 'hen', 'hex', 'hid', 'him', 'hip',
        'hob', 'hog', 'hop', 'hub', 'hue', 'hut', 'ice', 'imp', 'ink', 'inn', 'ion', 'ire', 'ivy', 'jab', 'jag', 'jar', 'jaw', 'jay', 'jet', 'jig'],
      4: ['lamp', 'bird', 'rain', 'cold', 'fish', 'dark', 'moon', 'tree', 'wind', 'dust', 'frog', 'leaf', 'pond', 'star', 'wolf', 'bell', 'cave',
        'dove', 'fern', 'kite', 'barn', 'bear', 'boat', 'bone', 'boot', 'bowl', 'brew', 'brow', 'buck', 'bull', 'burp', 'bush', 'buzz', 'cake',

      5: ['ocean', 'light', 'dream', 'cloud', 'flame', 'stone', 'river', 'crane', 'frost', 'bloom', 'grape', 'honey', 'ivory', 'jewel', 'lemon',
        'maple', 'noble', 'olive', 'pearl', 'quilt', 'rebel', 'shrub', 'tiger', 'umbra', 'viola', 'waltz', 'xenon', 'yacht', 'zebra', 'abbey',
        'acorn', 'adore', 'agile', 'album', 'aloft', 'amber', 'amble', 'angel', 'ankle', 'anvil', 'apron', 'arbor', 'ardor', 'arrow', 'attic',

        'blade', 'bland', 'blank', 'blast', 'blaze', 'bleak', 'blend', 'bless', 'bliss', 'block', 'blood', 'bloom', 'blown', 'blunt', 'blurt'],
      6: ['candle', 'forest', 'garden', 'breeze', 'castle', 'dragon', 'falcon', 'island', 'jungle', 'kitten', 'meadow', 'nectar', 'pebble',
        'rabbit', 'sunset', 'throne', 'velvet', 'walnut', 'zenith', 'beacon', 'anchor', 'antler', 'ardent', 'armory', 'artery', 'artist',
        'autumn', 'awning', 'bamboo', 'barrel', 'basket', 'battle', 'bellow', 'bitter', 'blazer', 'blouse', 'border', 'bottle', 'bounce',
        'bounty', 'bridge', 'bridle', 'bronze', 'bucket', 'bundle', 'burrow', 'butter', 'button', 'cactus', 'canopy', 'canvas', 'carpet',
        'carrot', 'cavern', 'cellar', 'cement', 'center', 'cermet', 'chapel', 'charge', 'cherry', 'chisel', 'cinder', 'circle', 'citrus',
        'clamor', 'clover', 'cobble', 'coffee', 'column', 'combat', 'comet', 'copper', 'corner', 'cotton', 'cradle', 'crater', 'crimson'],
      7: ['blanket', 'chimney', 'dolphin', 'feather', 'glacier', 'harvest', 'lantern', 'monster', 'octopus', 'pilgrim', 'rainbow', 'shelter',
        'tornado', 'volcano', 'weather', 'fiction', 'impulse', 'journey', 'knights', 'magical', 'abandon', 'absolve', 'account', 'accused',
        'acrobat', 'admiral', 'advance', 'affable', 'ailment', 'aileron', 'airlock', 'almanac', 'alphorn', 'ambient', 'ambling', 'amended',
        'ancient', 'another', 'antique', 'anxiety', 'armored', 'arousal', 'arsenal', 'ascetic', 'ashamed', 'asunder', 'audible', 'balance',
        'baffled', 'barrage', 'battery', 'bedroom', 'benefit', 'beneath', 'blossom', 'boulder', 'bowling', 'bracket', 'breadth', 'brewing',
        'cabinet', 'captain', 'careful', 'cascade', 'cavalry', 'ceiling', 'charged', 'charity', 'chapter', 'classic', 'climate', 'cluster']
    };

    // ── Round config ─────────────────────────────────────────────
    const ROUND_TABLE = [
      { words: 3, lengths: [3], display: 5, typing: 35 },
      { words: 3, lengths: [4], display: 4, typing: 30 },
      { words: 4, lengths: [4], display: 4, typing: 30 },
      { words: 4, lengths: [5], display: 3.5, typing: 28 },
      { words: 5, lengths: [5], display: 3, typing: 25 },
      { words: 5, lengths: [5, 6], display: 2.5, typing: 23 },
      { words: 6, lengths: [6], display: 2.5, typing: 22 },
      { words: 6, lengths: [6], display: 2, typing: 20 },
      { words: 7, lengths: [6, 7], display: 2, typing: 18 },
    ];
    function getRoundConfig(round) {
      if (round <= 9) return ROUND_TABLE[round - 1];
      const over = round - 9;
      return {
        words: 7 + Math.ceil(over / 2),
        lengths: [6, 7],
        display: 2,
        typing: Math.max(15, 18 - Math.floor(over / 2)),
      };
    }

    // ── Little Boi messages ──────────────────────────────────────
    const BOI_MESSAGES = {
      intro: [
        "eyes on the table",
        "try not to disappoint me",
        "pay attention this time",
        "don't blink",
      ],
      showing: [
        "...",
        "focus",
        "are you watching",
        "keep up",
      ],
      typing: [
        "hmm",
        "really",
        "...that's it?",
        "nothing?",
        "boring",
        "come on",
        "well?",
        "is that really all?",
        "you had more... i know you did",
        "don't tell me you've already forgotten",
        "there were more words than that",
        "struggling are we?",
        "oh is it hard... poor thing~",
        "you look so serious right now",
        "the concentration face is... something",
        "i've seen better from first-timers",
        "i'm still here you know",
        "take your time~ no rush",
        "you could impress me if you tried",
        "i'll wait... i'm very patient",
        "...you're not completely hopeless",
        "the clock doesn't negotiate",
        "the house always wins... eventually",
        "other players don't hesitate like this",
        "every second you waste... i enjoy~",
        "you're staring at the input like it owes you something",
        "it's alright to struggle... doesn't make it less entertaining",
        "think harder... i can practically see the gears turning",
        "you do remember something don't you",
        "surely there were more",
        "i'm watching... little one",
        "the timer cares even if i don't",
        "don't give up on me now",
        "there's no shame in trying... but there is in stopping",
        "...still thinking... how sweet",
        "you had one job",
        "dig a little deeper",
        "i haven't looked away once~",
        "almost out of time... little one",
        "what a face you're making",
      ],
      success: [
        "...hm not bad",
        "i suppose you paid attention",
        "fine... that was acceptable",
        "don't look so pleased with yourself",
        "...i'll admit... that was decent",
        "you can stay another round",
      ],
      partial: [
        "so close... and yet",
        "almost... you were almost there",
        "you dropped one... tsk",
        "disappointing... but fixable",
        "not quite little one",
        "i expected more... try again",
      ],
      idle: [
        "...are you going to play or just sit there",
        "i don't have all night you know",
        "hello?",
        "take your time... really... it's not like i'm waiting~",
        "...still here",
        "you do remember the words right",
        "any day now",
        "the clock is running... just so you know",
      ],
      gameover: [
        "and that's that... settle up",
        "game over... you lasted longer than most",
        "everyone loses eventually... even the good ones",
        "come back when you're ready to focus",
      ],
      correct: [
        "...oh",
        "fine... that counts",
        "hm... carry on",
        "so you do remember~",
        "not bad",
        "i'll allow it",
        "one down",
      ],
      wrong: [
        "no",
        "try again",
        "...really?",
        "that wasn't it",
        "nope",
        "not even close",
        "wrong",
        "that wasn't one of them",
      ],
    };

    const INTRO_LINES = [
      { text: "oh... a new face", ms: 2000 },
      { text: "sit down... i don't bite~", ms: 2000 },
      { text: "i'll show you words one at a time", ms: 2600 },
      { text: "remember all of them", ms: 1800 },
      { text: "when i'm done type back everything you saw", ms: 2600 },
      { text: "miss too many and you lose a heart", ms: 2400 },
      { text: "you have five... please don't waste them all", ms: 2600 },
      { text: "...ready when you are", ms: 2000 },
    ];

    const PHASE_LABELS = {
      idle: '--', ready: '準備中', showing: '表示中',
      typing: '入力中', eval: '評価中', gameover: '終了'
    };

    function boiSay(category) {
      const msgs = BOI_MESSAGES[category];
      const msg = msgs[Math.floor(Math.random() * msgs.length)];
      const bubble = document.getElementById('boi-bubble');
      bubble.textContent = msg;
      bubble.classList.add('visible');
    }
    function boiShow(text) {
      if (state.typewriterTimer) {
        clearTimeout(state.typewriterTimer);
        state.typewriterTimer = null;
      }
      const bubble = document.getElementById('boi-bubble');
      bubble.textContent = text;
      bubble.classList.add('visible');
    }

    function boiTypewrite(text) {
      if (state.typewriterTimer) {
        clearTimeout(state.typewriterTimer);
        state.typewriterTimer = null;
      }
      const bubble = document.getElementById('boi-bubble');
      bubble.textContent = '';
      bubble.classList.add('visible');
      let i = 0;
      function tick() {
        if (i < text.length) {
          bubble.textContent += text[i++];
          state.typewriterTimer = setTimeout(tick, 28);
        } else {
          state.typewriterTimer = null;
        }
      }
      tick();
    }
    function boiHide() {
      document.getElementById('boi-bubble').classList.remove('visible');
    }

    function stopTypingTaunts() {
      clearInterval(state.tauntInterval);
      state.tauntInterval = null;
      clearTimeout(state.tauntTimeout);
      state.tauntTimeout = null;
      clearTimeout(state.idleTimeout);
      state.idleTimeout = null;
    }

    function scheduleTaunt() {
      clearTimeout(state.tauntTimeout);
      state.tauntTimeout = setTimeout(() => {
        state.tauntTimeout = null;
        if (state.phase === 'typing') {
          const msgs = BOI_MESSAGES.typing;
          boiTypewrite(msgs[Math.floor(Math.random() * msgs.length)]);
          resetIdleTimer();
        }
      }, 5000);
    }

    function resetIdleTimer() {
      clearTimeout(state.idleTimeout);
      state.idleTimeout = setTimeout(() => {
        if (state.phase !== 'typing') return;
        const msgs = BOI_MESSAGES.idle;
        boiTypewrite(msgs[Math.floor(Math.random() * msgs.length)]);
        resetIdleTimer();
      }, 9000);
    }

    async function playIntro() {
      for (const line of INTRO_LINES) {
        boiShow(line.text);
        await delay(line.ms);
        boiHide();
        await delay(180);
      }
      startGame();
    }

    // ── Game state ───────────────────────────────────────────────
    let state = {
      round: 1,
      lives: 3,
      score: 0,
      phase: 'idle',
      currentWords: [],
      submittedWords: [],
      roundId: 0,
      typingTimeout: null,
      typingSeconds: 0,
      tauntInterval: null,
      tauntTimeout: null,
      idleTimeout: null,
      typewriterTimer: null,
      lastReactionTime: 0,
    };

    // ── Helpers ──────────────────────────────────────────────────
    function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

    function pickWords(count, lengths) {
      const pool = lengths.flatMap(len => WORDS[len] || []);
      const shuffled = pool.slice().sort(() => Math.random() - 0.5);
      return shuffled.slice(0, count);
    }

    function startTimerBar(seconds) {
      const bar = document.getElementById('timer-bar');
      bar.style.transition = 'none';
      bar.style.animation = 'none';
      bar.style.width = '100%';
      bar.style.background = '#ffffff';
      bar.offsetWidth;
      bar.style.transition = `width ${seconds}s linear`;
      bar.style.animation = `timer-color ${seconds}s linear forwards`;
      bar.style.width = '0%';
    }

    function stopTimerBar() {
      const bar = document.getElementById('timer-bar');
      bar.style.transition = 'none';
      bar.style.animation = 'none';
      bar.style.width = '0%';
    }

    function penalizeTimer() {
      const bar = document.getElementById('timer-bar');
      const wrap = document.getElementById('timer-bar-wrap');
      const currentWidth = bar.getBoundingClientRect().width;
      const totalWidth = wrap.getBoundingClientRect().width;
      if (totalWidth === 0 || state.typingSeconds === 0) return;
      const currentFraction = currentWidth / totalWidth;
      const newFraction = Math.max(0, currentFraction - 0.08);
      const remainingSeconds = newFraction * state.typingSeconds;
      bar.style.transition = 'none';
      bar.style.width = (newFraction * 100) + '%';
      bar.offsetWidth;
      bar.style.transition = `width ${remainingSeconds}s linear`;
      bar.style.width = '0%';
      clearTimeout(state.typingTimeout);
      const myRoundId = state.roundId;
      state.typingTimeout = setTimeout(() => {
        if (state.roundId !== myRoundId) return;
        evaluateRound(myRoundId);
      }, remainingSeconds * 1000);
    }

    function updateHUD() {
      document.getElementById('round-display').textContent = String(state.round).padStart(2, '0');
      document.getElementById('score-display').textContent = String(state.score).padStart(2, '0');

      const heartsEl = document.getElementById('hearts');
      heartsEl.innerHTML = '';
      for (let i = 0; i < 5; i++) {
        const span = document.createElement('span');
        span.className = 'heart' + (i < state.lives ? '' : ' off');
        const img = document.createElement('img');
        img.src = './res/img/pixel-heart.png';
        img.alt = 'heart';
        span.appendChild(img);
        heartsEl.appendChild(span);
      }
    }

    // ── Game flow ────────────────────────────────────────────────
    function startGame() {
      state.round = 1;
      state.lives = 5;
      state.score = 0;
      state.phase = 'idle';
      state.roundId = 0;
      updateHUD();
      startRound();
    }

    async function startRound() {
      state.roundId++;
      const myRoundId = state.roundId;
      state.phase = 'ready';
      state.submittedWords = [];

      const config = getRoundConfig(state.round);
      state.currentWords = pickWords(config.words, config.lengths);

      document.getElementById('typing-area').classList.add('hidden');
      document.getElementById('submitted-words').innerHTML = '';
      document.getElementById('correct-words-list').innerHTML = '';
      document.getElementById('word-input').value = '';
      stopTimerBar();
      updateHUD();

      document.getElementById('ready-text').textContent = `ROUND  ${String(state.round).padStart(2, '0')}`;
      document.getElementById('ready-screen').classList.remove('hidden');
      boiSay('intro');
      await delay(2200);
      if (state.roundId !== myRoundId) return;

      document.getElementById('ready-screen').classList.add('hidden');
      boiHide();
      await delay(300);
      if (state.roundId !== myRoundId) return;

      showWords(myRoundId, config);
    }

    async function showWords(myRoundId, config) {
      state.phase = 'showing';
      updateHUD();
      const bubble = document.getElementById('boi-bubble');

      for (const word of state.currentWords) {
        if (state.roundId !== myRoundId) return;
        bubble.textContent = word.toUpperCase().split('').join(' ');
        bubble.classList.add('visible', 'word-display');
        startTimerBar(config.display);
        await delay(config.display * 1000);
        if (state.roundId !== myRoundId) return;
        bubble.classList.remove('visible', 'word-display');
        await delay(300);
      }

      if (state.roundId !== myRoundId) return;
      startTyping(myRoundId, config);
    }

    function startTyping(myRoundId, config) {
      state.phase = 'typing';
      updateHUD();
      document.getElementById('typing-area').classList.remove('hidden');
      document.getElementById('word-input').focus();
      state.typingSeconds = config.typing;
      startTimerBar(config.typing);
      boiShow('...');
      resetIdleTimer();

      state.typingTimeout = setTimeout(() => {
        if (state.roundId !== myRoundId) return;
        evaluateRound(myRoundId);
      }, config.typing * 1000);
    }

    function submitWord() {
      const input = document.getElementById('word-input');
      const typed = input.value.trim().toLowerCase();
      input.value = '';
      if (!typed) return;

      if (state.submittedWords.includes(typed)) return;

      const correct = state.currentWords.includes(typed);
      state.submittedWords.push(typed);

      if (!correct) penalizeTimer();
      resetIdleTimer();
      const now = Date.now();
      const WRONG_COOLDOWN = 2000;
      if (correct || now - state.lastReactionTime >= WRONG_COOLDOWN) {
        state.lastReactionTime = now;
        const pool = BOI_MESSAGES[correct ? 'correct' : 'wrong'];
        boiTypewrite(pool[Math.floor(Math.random() * pool.length)]);
        scheduleTaunt();
      }

      const pill = document.createElement('span');
      pill.className = 'submitted-word' + (correct ? ' correct' : '');
      pill.textContent = typed;
      document.getElementById('submitted-words').appendChild(pill);

      if (correct) {
        const entry = document.createElement('span');
        entry.className = 'correct-word-entry';
        entry.textContent = typed;
        document.getElementById('correct-words-list').appendChild(entry);
      }

      const correctCount = state.submittedWords.filter(w => state.currentWords.includes(w)).length;
      if (correctCount === state.currentWords.length) {
        clearTimeout(state.typingTimeout);
        evaluateRound(state.roundId);
      }
    }

    async function evaluateRound(myRoundId) {
      state.phase = 'eval';
      updateHUD();
      stopTimerBar();
      stopTypingTaunts();
      document.getElementById('word-input').blur();

      const missed = state.currentWords.filter(w => !state.submittedWords.includes(w));
      if (missed.length > 0) state.lives -= 1;
      if (state.lives < 0) state.lives = 0;
      updateHUD();

      if (missed.length === 0) {
        boiSay('success');
      } else {
        boiSay('partial');
        const container = document.getElementById('submitted-words');
        missed.forEach(w => {
          const pill = document.createElement('span');
          pill.className = 'submitted-word missed';
          pill.textContent = w + ' ✗';
          container.appendChild(pill);
        });
      }

      await delay(2500);
      if (state.roundId !== myRoundId) return;

      if (state.lives <= 0) {
        gameOver();
        return;
      }

      state.score++;
      state.round++;
      boiHide();
      document.getElementById('typing-area').classList.add('hidden');
      startRound();
    }

    function gameOver() {
      state.phase = 'gameover';
      updateHUD();
      document.getElementById('typing-area').classList.add('hidden');
      stopTimerBar();
      boiSay('gameover');
      document.getElementById('final-score').innerHTML =
        `rounds survived&nbsp;&nbsp;<strong>${state.score}</strong>`;
      document.getElementById('gameover-screen').classList.remove('hidden');
    }

    document.getElementById('word-input').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') submitWord();
    });

    document.getElementById('restart-btn').addEventListener('click', function () {
      document.getElementById('gameover-screen').classList.add('hidden');
      boiHide();
      startGame();
    });

    document.getElementById('start-btn').addEventListener('click', function () {
      document.getElementById('start-overlay').style.display = 'none';
      const bgm = document.getElementById('bgm');
      bgm.volume = 0.25;
      bgm.play();
      playIntro();
    });

    // ── Marquee setup ────────────────────────────────────────────
    document.fonts.ready.then(function () {
      const inner = document.querySelector('.marquee-inner');
      const source = inner.querySelector('span');
      const containerW = inner.parentElement.offsetWidth;
      const itemW = source.offsetWidth;
      const copies = Math.ceil((containerW * 2) / itemW) + 1;
      for (let i = 1; i < copies; i++) {
        inner.appendChild(source.cloneNode(true));
      }
      inner.style.setProperty('--marquee-offset', `-${itemW}px`);
      inner.classList.add('ready');
    });
  </script>
</body>

</html>
